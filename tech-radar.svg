  <rect x="0" y="0" width="1400" height="480" fill="url(#vignette)"/>
  <rect x="1.5" y="1.5" width="1397" height="477" rx="19" ry="19" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3"/>
