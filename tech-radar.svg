      <g transform="translate(0, 36)"><g class="tech-pill"><rect class="pill-rect" x="0" y="0" width="62" height="28" rx="14" fill="rgba(201,164,76,0.04)" stroke="url(#goldGrad)" stroke-width="0.6" stroke-opacity="0.3"/><text x="31" y="18" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#D9D3C4">Go</text></g></g>
