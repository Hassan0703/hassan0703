<svg width="1400" height="620" viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A0806"/>
    <stop offset="55%" stop-color="#14100B"/>
    <stop offset="100%" stop-color="#1C160E"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E8C77E"/>
    <stop offset="50%" stop-color="#C9A44C"/>
    <stop offset="100%" stop-color="#9C7A2E"/>
  </linearGradient>
  <linearGradient id="holoSweep" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="40%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="50%" stop-color="#FFF8E7" stop-opacity="0.35"/>
    <stop offset="60%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="100%" stop-color="#E8C77E" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
  </radialGradient>
  <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
  </filter>
  <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="hexPattern" width="46" height="80" patternUnits="userSpaceOnUse">
    <path d="M23 0 L46 13 L46 40 L23 53 L0 40 L0 13 Z" fill="none" stroke="#C9A44C" stroke-opacity="0.03" stroke-width="1"/>
    <path d="M23 40 L46 53 L46 80 L23 93 L0 80 L0 53 Z" fill="none" stroke="#C9A44C" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <clipPath id="canvasClip"><rect x="0" y="0" width="1400" height="620" rx="20" ry="20"/></clipPath>
  <style>
    <![CDATA[
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes fadeInUp { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes flowDot { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(60px); opacity: 0; } }
      @keyframes holoSweep { 0% { transform: translateX(-200%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(200%); opacity: 0; } }
      .layer-card { transition: transform 0.3s ease, filter 0.3s ease; transform-box: fill-box; transform-origin: center; }
      .layer-card:hover { transform: translateX(4px); filter: drop-shadow(0 4px 16px rgba(201,164,76,0.15)); }
      .layer-card:hover .layer-bg { stroke-opacity: 0.7; fill: rgba(201,164,76,0.06); transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .layer-card:hover .holo-overlay { animation: holoSweep 0.4s ease forwards; }
      .layer-card:hover .layer-title { fill: #F5F2EA; transition: fill 0.3s ease; }
      .layer-bg { transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .holo-overlay { opacity: 0; pointer-events: none; }
      .layer-title { transition: fill 0.3s ease; }
      .fade-el { opacity: 0; }
      .fade-el.h { animation: fadeIn 0.5s ease 0s forwards; }
      .fade-el.l1 { animation: fadeInUp 0.4s ease 0.1s forwards; }
      .fade-el.l2 { animation: fadeInUp 0.4s ease 0.15s forwards; }
      .fade-el.l3 { animation: fadeInUp 0.4s ease 0.2s forwards; }
      .fade-el.l4 { animation: fadeInUp 0.4s ease 0.25s forwards; }
      .fade-el.l5 { animation: fadeInUp 0.4s ease 0.3s forwards; }
      .fade-el.l6 { animation: fadeInUp 0.4s ease 0.35s forwards; }
      .fade-el.l7 { animation: fadeInUp 0.4s ease 0.4s forwards; }
      .fade-el.l8 { animation: fadeInUp 0.4s ease 0.45s forwards; }
      .arrow-line { stroke-dasharray: 6 4; }
    ]]>
  </style>
</defs>
<g clip-path="url(#canvasClip)">
  <rect x="0" y="0" width="1400" height="620" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1400" height="620" fill="url(#hexPattern)"/>
  <rect x="0" y="0" width="1400" height="620" fill="url(#vignette)"/>
  <rect x="1.5" y="1.5" width="1397" height="617" rx="19" ry="19" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3"/>
  <text class="fade-el h" x="700" y="55" text-anchor="middle" font-family="'Arial Black','Segoe UI',sans-serif" font-weight="800" font-size="28" fill="#F5F2EA">Architecture</text>
  <rect class="fade-el h" x="590" y="70" width="220" height="2.5" rx="1.25" fill="url(#goldGrad)"/>
  <text class="fade-el h" x="700" y="93" text-anchor="middle" font-family="Consolas,monospace" font-size="10" fill="#8A8272" letter-spacing="2">HOW I BUILD SYSTEMS</text>
  <!-- Left column layers -->
  <!-- Frontend -->
  <g transform="translate(320, 120)"><g class="fade-el l1"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Frontend</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Vue 3 / JS</text>
  </g></g></g>
  <!-- Arrow 1 -->
  <g transform="translate(440, 160)"><g class="fade-el l1">
    <line x1="0" y1="0" x2="0" y2="30" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="0" cy="5" r="2.5" fill="url(#goldGrad)" opacity="0.5">
      <animate attributeName="cy" values="0;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g></g>
  <!-- API Layer -->
  <g transform="translate(320, 195)"><g class="fade-el l2"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">API Layer</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">REST / GraphQL</text>
  </g></g></g>
  <!-- Arrow 2 -->
  <g transform="translate(440, 235)"><g class="fade-el l2">
    <line x1="0" y1="0" x2="0" y2="30" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="0" cy="5" r="2.5" fill="url(#goldGrad)" opacity="0.5">
      <animate attributeName="cy" values="0;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g></g>
  <!-- Frappe Framework -->
  <g transform="translate(320, 270)"><g class="fade-el l3"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Frappe Framework</text>
    <text x="140" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Python / Jinja2</text>
  </g></g></g>
  <!-- Arrow 3 -->
  <g transform="translate(440, 310)"><g class="fade-el l3">
    <line x1="0" y1="0" x2="0" y2="30" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="0" cy="5" r="2.5" fill="url(#goldGrad)" opacity="0.5">
      <animate attributeName="cy" values="0;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g></g>
  <!-- ERPNext -->
  <g transform="translate(320, 345)"><g class="fade-el l4"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">ERPNext</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">ERP Modules</text>
  </g></g></g>
  <!-- Arrow 4 -->
  <g transform="translate(440, 385)"><g class="fade-el l4">
    <line x1="0" y1="0" x2="0" y2="30" stroke="url(#goldGrad)" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4 4"/>
    <circle cx="0" cy="5" r="2.5" fill="url(#goldGrad)" opacity="0.5">
      <animate attributeName="cy" values="0;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g></g>
  <!-- Business Logic -->
  <g transform="translate(320, 420)"><g class="fade-el l5"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Business Logic</text>
    <text x="128" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Python / Hooks</text>
  </g></g></g>
  <!-- Right column: Data / Infrastructure -->
  <!-- MariaDB -->
  <g transform="translate(860, 140)"><g class="fade-el l5"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">MariaDB</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Primary Database</text>
  </g></g></g>
  <!-- Redis -->
  <g transform="translate(860, 215)"><g class="fade-el l6"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Redis</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Cache / Queue</text>
  </g></g></g>
  <!-- Scheduler -->
  <g transform="translate(860, 290)"><g class="fade-el l7"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Scheduler</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Cron / Background</text>
  </g></g></g>
  <!-- Background Jobs -->
  <g transform="translate(860, 365)"><g class="fade-el l8"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Background Jobs</text>
    <text x="140" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Async Workers</text>
  </g></g></g>
  <!-- Horizontal connecting arrow from Business Logic to data layer -->
  <g transform="translate(560, 410)"><g class="fade-el l5">
    <line x1="0" y1="5" x2="300" y2="5" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="4 4"/>
    <circle cx="10" cy="5" r="2" fill="url(#goldGrad)" opacity="0.4">
      <animate attributeName="cx" values="0;300" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g></g>
  <!-- Users layer at bottom -->
  <g transform="translate(590, 500)"><g class="fade-el l8"><g class="layer-card">
    <rect class="layer-bg" x="0" y="0" width="240" height="40" rx="10" fill="rgba(201,164,76,0.04)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.35" stroke-dasharray="4 4" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="240" height="40" rx="10" fill="url(#holoSweep)" opacity="0"/>
    <text class="layer-title" x="16" y="25" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="13" fill="#EDE7D8">Users</text>
    <text x="100" y="25" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8A8272">Desktop / Mobile</text>
  </g></g></g>
  <!-- Collector arrows from both columns to Users -->
  <g transform="translate(560, 460)"><g class="fade-el l8">
    <line x1="0" y1="5" x2="30" y2="40" stroke="url(#goldGrad)" stroke-width="0.6" stroke-opacity="0.15" stroke-dasharray="3 4"/>
  </g></g>
  <g transform="translate(860, 405)"><g class="fade-el l8">
    <line x1="0" y1="5" x2="-30" y2="95" stroke="url(#goldGrad)" stroke-width="0.6" stroke-opacity="0.15" stroke-dasharray="3 4"/>
  </g></g>
  <!-- Central system label -->
  <text class="fade-el h" x="700" y="110" text-anchor="middle" font-family="Consolas,monospace" font-size="9" fill="#6A6358" letter-spacing="1">SYSTEM ARCHITECTURE</text>
  <g transform="translate(560, 108)"><g class="fade-el h">
    <rect x="0" y="0" width="280" height="18" rx="9" fill="rgba(201,164,76,0.04)" stroke="url(#goldGrad)" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="140" y="13" text-anchor="middle" font-family="Consolas,monospace" font-size="8" fill="#6A6358" letter-spacing="1">APP LAYER</text>
  </g></g>
  <g transform="translate(860, 108)"><g class="fade-el h">
    <rect x="0" y="0" width="240" height="18" rx="9" fill="rgba(201,164,76,0.04)" stroke="url(#goldGrad)" stroke-width="0.5" stroke-opacity="0.2"/>
    <text x="120" y="13" text-anchor="middle" font-family="Consolas,monospace" font-size="8" fill="#6A6358" letter-spacing="1">DATA LAYER</text>
  </g></g>
</g>
</svg>