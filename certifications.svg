<svg width="1400" height="380" viewBox="0 0 1400 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A0806"/>
    <stop offset="55%" stop-color="#14100B"/>
    <stop offset="100%" stop-color="#1C160E"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E8C77E"/>
    <stop offset="50%" stop-color="#C9A44C"/>
    <stop offset="100%" stop-color="#9C7A2E"/>
  </linearGradient>
  <linearGradient id="holoSweep" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="40%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="50%" stop-color="#FFF8E7" stop-opacity="0.35"/>
    <stop offset="60%" stop-color="#E8C77E" stop-opacity="0"/>
    <stop offset="100%" stop-color="#E8C77E" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
  </radialGradient>
  <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
  </filter>
  <filter id="goldGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="hexPattern" width="46" height="80" patternUnits="userSpaceOnUse">
    <path d="M23 0 L46 13 L46 40 L23 53 L0 40 L0 13 Z" fill="none" stroke="#C9A44C" stroke-opacity="0.03" stroke-width="1"/>
    <path d="M23 40 L46 53 L46 80 L23 93 L0 80 L0 53 Z" fill="none" stroke="#C9A44C" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <clipPath id="canvasClip"><rect x="0" y="0" width="1400" height="380" rx="20" ry="20"/></clipPath>
  <style>
    <![CDATA[
      @keyframes fadeInUp { 0% { transform: translateY(12px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes holoSweep { 0% { transform: translateX(-800px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(800px); opacity: 0; } }
      .cert-card { transition: transform 0.3s ease, filter 0.3s ease; }
      .cert-card:hover { transform: translateY(-2px); filter: url(#hoverShadow); }
      .cert-card:hover .card-bg { stroke-opacity: 0.7; fill: rgba(201,164,76,0.06); transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .cert-card:hover .holo-overlay { animation: holoSweep 0.5s ease forwards; }
      .cert-card:hover .cert-title { fill: #F5F2EA; transition: fill 0.3s ease; }
      .cert-card:hover .cert-badge { stroke-opacity: 0.8; transition: stroke-opacity 0.3s ease; }
      .card-bg { transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .holo-overlay { opacity: 0; pointer-events: none; }
      .cert-title { transition: fill 0.3s ease; }
      .cert-badge { transition: stroke-opacity 0.3s ease; }
      .fade-el { opacity: 0; }
      .fade-el.h { animation: fadeInUp 0.5s ease 0s forwards; }
      .fade-el.c1 { animation: fadeInUp 0.4s ease 0.1s forwards; }
      .fade-el.c2 { animation: fadeInUp 0.4s ease 0.2s forwards; }
      .fade-el.c3 { animation: fadeInUp 0.4s ease 0.3s forwards; }
    ]]>
  </style>

  <filter id="hoverShadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#C9A44C" flood-opacity="0.2"/>
  </filter>
</defs>
<g clip-path="url(#canvasClip)">
  <rect x="0" y="0" width="1400" height="380" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1400" height="380" fill="url(#hexPattern)"/>
  <rect x="0" y="0" width="1400" height="380" fill="url(#vignette)"/>
  <rect x="1.5" y="1.5" width="1397" height="377" rx="19" ry="19" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3"/>
  <text class="fade-el h" x="700" y="55" text-anchor="middle" font-family="'Arial Black','Segoe UI',sans-serif" font-weight="800" font-size="32" fill="#F5F2EA">Certifications</text>
  <rect class="fade-el h" x="590" y="70" width="240" height="3" rx="1.5" fill="url(#goldGrad)"/>
  <text class="fade-el h" x="700" y="93" text-anchor="middle" font-family="Consolas,monospace" font-size="12" fill="#8A8272" letter-spacing="2">CREDENTIALS &amp; ACHIEVEMENTS</text>
  <!-- Cert 1 -->
  <g transform="translate(60, 130)"><g class="fade-el c1">
      <g class="cert-card">
    <rect class="card-bg" x="0" y="0" width="400" height="210" rx="14" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="400" height="210" rx="14" fill="url(#holoSweep)" opacity="0"/>
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="46" height="46" rx="11" fill="rgba(201,164,76,0.06)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.4"/>
      <g transform="translate(20, 20) scale(1.4)">
        <path d="M-8 0l8-8 8 8-8 8-8-8z" fill="none" stroke="url(#goldGrad)" stroke-width="0.9" stroke-linejoin="round"/>
      </g>
    </g>
    <text class="cert-title" x="20" y="86" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="16" fill="#EDE7D8">ERPNext Professional</text>
    <text x="20" y="106" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8A8272">Frappe Technologies Pvt. Ltd.</text>
    <text x="20" y="128" font-family="'Segoe UI',sans-serif" font-size="12" fill="#6A6358">Completed 2024</text>
    <g class="cert-badge" transform="translate(20, 150)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(76,175,80,0.1)" stroke="#4CAF50" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="36" y="15" text-anchor="middle" font-family="Consolas,monospace" font-size="10" font-weight="700" fill="#4CAF50">VERIFIED</text>
    </g>
  </g>
</g>
</g>
  <!-- Cert 2 -->
  <g transform="translate(500, 130)">
    <g class="fade-el c2">
      <g class="cert-card">
    <rect class="card-bg" x="0" y="0" width="400" height="210" rx="14" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="400" height="210" rx="14" fill="url(#holoSweep)" opacity="0"/>
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="46" height="46" rx="11" fill="rgba(201,164,76,0.06)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.4"/>
      <g transform="translate(20, 20) scale(1.4)">
        <g transform="translate(-11, -12)">
          <path d="M6 10h4l2-6 2 6h4l-3.5 4.5L16 20l-4-3-4 3 1.5-5.5L6 10z" fill="none" stroke="url(#goldGrad)" stroke-width="0.9" stroke-linejoin="round"/>
        </g>
      </g>
    </g>
    <text class="cert-title" x="20" y="86" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="16" fill="#EDE7D8">Python Development</text>
    <text x="20" y="106" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8A8272">Python Institute</text>
    <text x="20" y="128" font-family="'Segoe UI',sans-serif" font-size="12" fill="#6A6358">Completed 2023</text>
    <g class="cert-badge" transform="translate(20, 150)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(76,175,80,0.1)" stroke="#4CAF50" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="36" y="15" text-anchor="middle" font-family="Consolas,monospace" font-size="10" font-weight="700" fill="#4CAF50">VERIFIED</text>
    </g>
  </g>
</g>
</g>
  <!-- Cert 3 -->
  <g transform="translate(940, 130)">
    <g class="fade-el c3">
      <g class="cert-card">
    <rect class="card-bg" x="0" y="0" width="400" height="210" rx="14" fill="rgba(201,164,76,0.02)" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3" filter="url(#cardShadow)"/>
    <rect class="holo-overlay" x="0" y="0" width="400" height="210" rx="14" fill="url(#holoSweep)" opacity="0"/>
    <g transform="translate(20, 20)">
      <rect x="0" y="0" width="46" height="46" rx="11" fill="rgba(201,164,76,0.06)" stroke="url(#goldGrad)" stroke-width="0.7" stroke-opacity="0.4"/>
      <g transform="translate(20, 20) scale(1.4)">
        <g transform="translate(-12, -12)">
          <path d="M4 4h16v16H4z" fill="none" stroke="url(#goldGrad)" stroke-width="0.9" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" fill="none" stroke="url(#goldGrad)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
    </g>
    <text class="cert-title" x="20" y="86" font-family="'Segoe UI',sans-serif" font-weight="700" font-size="16" fill="#EDE7D8">SQL &amp; Database Design</text>
    <text x="20" y="106" font-family="'Segoe UI',sans-serif" font-size="13" fill="#8A8272">LinkedIn Learning</text>
    <text x="20" y="128" font-family="'Segoe UI',sans-serif" font-size="12" fill="#6A6358">Completed 2023</text>
    <g class="cert-badge" transform="translate(20, 150)">
      <rect x="0" y="0" width="72" height="22" rx="11" fill="rgba(76,175,80,0.1)" stroke="#4CAF50" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="36" y="15" text-anchor="middle" font-family="Consolas,monospace" font-size="10" font-weight="700" fill="#4CAF50">VERIFIED</text>
    </g>
    </g>
  </g>
</g>
</g>
</svg>