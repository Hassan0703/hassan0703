  </pattern>
  <clipPath id="canvasClip"><rect x="0" y="0" width="1400" height="520" rx="20" ry="20"/></clipPath>
  <style>
    <![CDATA[
      @keyframes fadeInUp { 0% { transform: translateY(15px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes holoSweep { 0% { transform: translateX(-800px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(800px); opacity: 0; } }
      @keyframes lineGrow { 0% { stroke-dashoffset: 500; } 100% { stroke-dashoffset: 0; } }
      .focus-item { transition: transform 0.3s ease, filter 0.3s ease; }
      .focus-item:hover { transform: translateX(2px); filter: url(#hoverShadow); }
      .focus-item:hover .item-bg { stroke-opacity: 0.7; fill: rgba(201,164,76,0.06); transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .focus-item:hover .holo-overlay { animation: holoSweep 0.4s ease forwards; }
      .focus-item:hover .focus-title { fill: #F5F2EA; transition: fill 0.3s ease; }
      .item-bg { transition: fill 0.3s ease, stroke-opacity 0.3s ease; }
      .holo-overlay { opacity: 0; pointer-events: none; }
      .focus-title { transition: fill 0.3s ease; }
      .fade-el { opacity: 0; }
      .fade-el.f1 { animation: fadeInUp 0.5s ease 0s forwards; }
      .fade-el.f2 { animation: fadeInUp 0.5s ease 0.1s forwards; }
      .fade-el.f3 { animation: fadeInUp 0.5s ease 0.2s forwards; }
      .fade-el.f4 { animation: fadeInUp 0.5s ease 0.3s forwards; }
      .fade-el.f5 { animation: fadeInUp 0.5s ease 0.4s forwards; }
      .fade-el.h { animation: fadeInUp 0.5s ease 0s forwards; }
      .timeline-dot { opacity: 0; }
      .timeline-dot.t1 { animation: fadeInUp 0.4s ease 0.05s forwards; }
      .timeline-dot.t2 { animation: fadeInUp 0.4s ease 0.15s forwards; }
      .timeline-dot.t3 { animation: fadeInUp 0.4s ease 0.25s forwards; }
      .timeline-dot.t4 { animation: fadeInUp 0.4s ease 0.35s forwards; }
      .timeline-dot.t5 { animation: fadeInUp 0.4s ease 0.45s forwards; }
      .progress-fill { opacity: 0; }
      .progress-fill.p1 { animation: fadeInUp 0.6s ease 0.3s forwards; }
      .progress-fill.p2 { animation: fadeInUp 0.6s ease 0.4s forwards; }
      .progress-fill.p3 { animation: fadeInUp 0.6s ease 0.5s forwards; }
      .progress-fill.p4 { animation: fadeInUp 0.6s ease 0.6s forwards; }
      .progress-fill.p5 { animation: fadeInUp 0.6s ease 0.7s forwards; }
    ]]>
  </style>

