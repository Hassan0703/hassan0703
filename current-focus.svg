<svg width="1400" height="520" viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A0806"/>
    <stop offset="55%" stop-color="#14100B"/>
    <stop offset="100%" stop-color="#1C160E"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E8C77E"/>
    <stop offset="50%" stop-color="#C9A44C"/>
    <stop offset="100%" stop-color="#9C7A2E"/>
  </linearGradient>
  <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4CAF50"/>
    <stop offset="100%" stop-color="#81C784"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#42A5F5"/>
